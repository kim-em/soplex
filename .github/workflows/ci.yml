name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GMP / Boost / CMake / build tools
        run: |
          sudo apt-get update
          # `clang` + `libc++-dev` + `libc++abi-dev` let SoPlex and the
          # bridge compile against libc++, matching the libc++abi.a
          # Lake's link template pulls from Lean's bundled toolchain.
          sudo apt-get install -y \
            cmake build-essential ninja-build clang \
            libgmp-dev libgmpxx4ldbl libboost-dev \
            libc++-dev libc++abi-dev \
            zstd

      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Build Lean targets
        run: lake build Soplex ffi-check quickstart-example

      - name: Run ffi-check executable
        run: |
          set +e
          ./.lake/build/bin/ffi-check > /tmp/ffi-check.out 2>&1
          rc=$?
          tail -20 /tmp/ffi-check.out
          exit $rc

      - name: Run quickstart-example (README example, output asserted)
        run: |
          out="$(./.lake/build/bin/quickstart-example)"
          echo "$out"
          echo "$out" | grep -Fqx 'optimal x = #[2, 6]'

      - name: lake test
        run: lake test

  linux-asan:
    name: Linux ASan/UBSan
    runs-on: ubuntu-latest
    # Lands `true` while the job stabilises (per issue #21: "can land as
    # `true` initially while flakes are shaken out"). Flip to `false` to
    # make findings block merge once the job has been green for a while.
    continue-on-error: true
    env:
      # LSan would otherwise report Lean-runtime allocations that
      # legitimately survive process exit. ASan's UAF / OOB checks are
      # the value we want here.
      ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1:abort_on_error=1:symbolize=1:print_stacktrace=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install GMP / Boost / CMake / build tools
        run: |
          sudo apt-get update
          # Same package set as the plain Linux job. `llvm-symbolizer`
          # (from `llvm`) gives ASan/UBSan readable stack traces;
          # `scripts/install-sanitizer-runtime.sh` will pull a
          # version-matched clang + compiler-rt from apt.llvm.org once
          # the Lean toolchain is installed and we know which clang
          # major version it ships.
          sudo apt-get install -y \
            cmake build-essential ninja-build clang llvm \
            libgmp-dev libgmpxx4ldbl libboost-dev \
            libc++-dev libc++abi-dev \
            zstd

      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Plant compiler-rt sanitizer archives into Lean's clang
        run: ./scripts/install-sanitizer-runtime.sh

      - name: Locate ASan runtime for diagnostics
        run: |
          asan_so="$(find "$(lean --print-prefix)/lib/clang" \
            -path '*/lib/x86_64-unknown-linux-gnu/libclang_rt.asan.so' \
            | sort -V | tail -1)"
          if [ -z "$asan_so" ]; then
            echo "Could not find libclang_rt.asan.so under Lean's clang resource directory" >&2
            exit 1
          fi
          # Lean needs this preloaded while compiling sanitized shared
          # libraries, but sanitized executables must not inherit LD_PRELOAD:
          # their link already chooses an ASan runtime, and preloading a
          # second one aborts at process startup with "incompatible ASan
          # runtimes".
          echo "ASAN_RUNTIME=$asan_so" >> "$GITHUB_ENV"
          echo "Using ASan runtime: $asan_so"

      - name: Set UBSAN_OPTIONS with workspace-rooted suppressions
        run: |
          echo "UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1:abort_on_error=1:suppressions=$GITHUB_WORKSPACE/SoplexTest/sanitizer-suppressions.supp" >> "$GITHUB_ENV"

      - name: Build sanitized Lean targets
        run: LD_PRELOAD="$ASAN_RUNTIME" lake build -Ksanitize=1 Soplex ffi-check quickstart-example

      - name: Run ffi-check under ASan/UBSan
        run: |
          set +e
          ./.lake/build/bin/ffi-check > /tmp/ffi-check.out 2>&1
          rc=$?
          tail -40 /tmp/ffi-check.out
          exit $rc

      - name: Run quickstart-example under ASan/UBSan (output asserted)
        run: |
          out="$(./.lake/build/bin/quickstart-example)"
          echo "$out"
          echo "$out" | grep -Fqx 'optimal x = #[2, 6]'

      - name: Build sanitized test targets
        run: LD_PRELOAD="$ASAN_RUNTIME" lake build -Ksanitize=1 test-runner verify-tests solve-exact-tests solve-float-tests solve-compare-tests solve-verified-tests accessor-goldens file-io-tests

      - name: Run sanitized test suite
        run: ./.lake/build/bin/test-runner -Ksanitize=1

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GMP / Boost / build tools (Homebrew)
        run: |
          brew install gmp boost cmake ninja zstd

      # The lakefile hard-codes the Command Line Tools SDK path so that
      # configuration is pure (no IO at lake load time). macOS runners
      # ship Xcode but not always with CLT mounted at
      # /Library/Developer/CommandLineTools, so we ensure that path
      # exists by symlinking the active SDK there.
      - name: Ensure CLT SDK symlink
        run: |
          sdk_path="$(xcrun --show-sdk-path)"
          target="/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk"
          echo "active sdk: $sdk_path"
          if [ ! -d "$target" ]; then
            sudo mkdir -p "$(dirname "$target")"
            sudo ln -sfn "$sdk_path" "$target"
          fi
          ls -ld "$target"

      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Build Lean targets
        run: lake build Soplex ffi-check quickstart-example

      - name: Run ffi-check executable
        run: |
          set +e
          ./.lake/build/bin/ffi-check > /tmp/ffi-check.out 2>&1
          rc=$?
          tail -20 /tmp/ffi-check.out
          exit $rc

      - name: Run quickstart-example (README example, output asserted)
        run: |
          out="$(./.lake/build/bin/quickstart-example)"
          echo "$out"
          echo "$out" | grep -Fqx 'optimal x = #[2, 6]'

      - name: lake test
        run: lake test

  windows:
    name: Windows (MSYS2 / mingw-w64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-boost
            git
            curl
            unzip

      - name: Install elan and Lean toolchain
        run: |
          set -e
          curl -sSf -L https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-pc-windows-msvc.zip -o elan-init.zip
          unzip -q elan-init.zip
          MSYS2_ARG_CONV_EXCL="*" ./elan-init.exe -y --default-toolchain none --no-modify-path
          ELAN_DIR_MSYS="$(cygpath -u "$USERPROFILE")/.elan"
          ls -la "$ELAN_DIR_MSYS/bin" || (echo "elan install did not produce expected files" && exit 1)
          export PATH="$ELAN_DIR_MSYS/bin:$MINGW_PREFIX/bin:$PATH"
          ./scripts/install-toolchain.sh
          echo "$ELAN_DIR_MSYS/bin" > .elan-path
          echo "$MINGW_PREFIX/bin" >> .elan-path

      - name: Build Soplex and run ffi-check executable
        run: |
          set -e
          export PATH="$(paste -sd: .elan-path):$PATH"
          lake build Soplex ffi-check quickstart-example

          set +e
          ./.lake/build/bin/ffi-check.exe > /tmp/ffi-check.out 2>&1
          rc=$?
          tail -20 /tmp/ffi-check.out
          exit $rc

      - name: Run quickstart-example (README example, output asserted)
        run: |
          set -e
          export PATH="$(paste -sd: .elan-path):$PATH"
          out="$(./.lake/build/bin/quickstart-example.exe)"
          echo "$out"
          echo "$out" | grep -Fqx 'optimal x = #[2, 6]'

      - name: lake test
        run: |
          set -e
          export PATH="$(paste -sd: .elan-path):$PATH"
          lake test
