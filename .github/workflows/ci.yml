name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GMP / Boost / CMake / build tools
        run: |
          sudo apt-get update
          # libc++ packages are deliberately *not* installed: the
          # lakefile passes `-nostdlib++` on Linux so Lean's clang no
          # longer auto-links libc++/libc++abi (issue #6). If the smoke
          # binary links and runs without those packages present, libc++
          # cannot be a `DT_NEEDED` entry, which is the property the fix
          # depends on.
          sudo apt-get install -y \
            cmake build-essential ninja-build \
            libgmp-dev libgmpxx4ldbl libboost-dev \
            zstd

      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Build SoPlex
        run: ./scripts/build-soplex.sh

      - name: Build and run verify-tests
        run: |
          lake build verify-tests
          ./.lake/build/bin/verify-tests

      - name: Build Lean targets
        run: lake build LeanSoplex soplex-smoke

      - name: Verify libc++ is absent from the loader graph
        run: |
          # The Linux fix for #6 hinges on libc++/libc++abi being absent
          # from the dynamic loader's symbol scope so that libstdc++'s
          # `__gxx_personality_v0` is the only candidate at unwind time.
          # Check both the direct `DT_NEEDED` entries on our artifacts
          # (canary for `-nostdlib++` regressing) and the transitive
          # graph reported by `ldd` (canary for a Lean runtime DSO
          # silently introducing libc++abi).
          status=0
          mapfile -t artifacts < <(
            { find .lake/build -name '*.so' -type f
              echo .lake/build/bin/soplex-smoke; } | sort -u)
          for f in "${artifacts[@]}"; do
            [ -e "$f" ] || continue
            echo "--- $f"
            echo "  DT_NEEDED:"
            readelf -d "$f" | grep NEEDED || true
            if readelf -d "$f" | grep -E 'NEEDED.*libc\+\+'; then
              echo "ERROR: libc++ in DT_NEEDED of $f" >&2
              status=1
            fi
            echo "  ldd:"
            ldd "$f" || true
            if ldd "$f" 2>/dev/null | grep -E 'libc\+\+'; then
              echo "ERROR: libc++ in transitive loader graph of $f" >&2
              status=1
            fi
          done
          exit $status

      - name: Run smoke executable
        run: |
          set +e
          ./.lake/build/bin/soplex-smoke > /tmp/smoke.out 2>&1
          rc=$?
          tail -20 /tmp/smoke.out
          exit $rc

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install GMP / Boost / build tools (Homebrew)
        run: |
          brew install gmp boost cmake ninja zstd

      # The lakefile hard-codes the Command Line Tools SDK path so that
      # configuration is pure (no IO at lake load time). macOS runners
      # ship Xcode but not always with CLT mounted at
      # /Library/Developer/CommandLineTools, so we ensure that path
      # exists by symlinking the active SDK there.
      - name: Ensure CLT SDK symlink
        run: |
          sdk_path="$(xcrun --show-sdk-path)"
          target="/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk"
          echo "active sdk: $sdk_path"
          if [ ! -d "$target" ]; then
            sudo mkdir -p "$(dirname "$target")"
            sudo ln -sfn "$sdk_path" "$target"
          fi
          ls -ld "$target"

      - name: Install elan and Lean toolchain
        shell: bash
        run: |
          set -e
          if ! command -v elan >/dev/null 2>&1; then
            curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
            sh elan-init.sh -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          ./scripts/install-toolchain.sh

      - name: Build SoPlex
        run: ./scripts/build-soplex.sh

      - name: Build and run verify-tests
        run: |
          lake build verify-tests
          ./.lake/build/bin/verify-tests

      - name: Build Lean targets
        run: lake build LeanSoplex soplex-smoke

      - name: Run smoke executable
        run: |
          set +e
          ./.lake/build/bin/soplex-smoke > /tmp/smoke.out 2>&1
          rc=$?
          tail -20 /tmp/smoke.out
          exit $rc

  windows:
    name: Windows (MSYS2 / mingw-w64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-make
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-boost
            git
            curl
            unzip

      - name: Install elan and Lean toolchain
        run: |
          set -e
          curl -sSf -L https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-pc-windows-msvc.zip -o elan-init.zip
          unzip -q elan-init.zip
          MSYS2_ARG_CONV_EXCL="*" ./elan-init.exe -y --default-toolchain none --no-modify-path
          ELAN_DIR_MSYS="$(cygpath -u "$USERPROFILE")/.elan"
          ls -la "$ELAN_DIR_MSYS/bin" || (echo "elan install did not produce expected files" && exit 1)
          export PATH="$ELAN_DIR_MSYS/bin:$MINGW_PREFIX/bin:$PATH"
          ./scripts/install-toolchain.sh
          echo "$ELAN_DIR_MSYS/bin" > .elan-path
          echo "$MINGW_PREFIX/bin" >> .elan-path

      - name: Stage mingw runtime libraries
        run: |
          set -e
          ./scripts/stage-mingw-libs.sh
          ls -la vendor/mingw-libs/

      - name: Build SoPlex
        run: |
          set -e
          export PATH="$(paste -sd: .elan-path):$PATH"
          ./scripts/build-soplex.sh

      - name: Build and run verify-tests
        run: |
          set -e
          export PATH="$(paste -sd: .elan-path):$PATH"
          lake build verify-tests
          ./.lake/build/bin/verify-tests.exe

      - name: Build LeanSoplex and run smoke executable
        run: |
          set -e
          export PATH="$(paste -sd: .elan-path):$PATH"
          lake build LeanSoplex soplex-smoke

          set +e
          ./.lake/build/bin/soplex-smoke.exe > /tmp/smoke.out 2>&1
          rc=$?
          tail -20 /tmp/smoke.out
          exit $rc
